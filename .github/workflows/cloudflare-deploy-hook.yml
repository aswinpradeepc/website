name: Trigger Cloudflare Deploy Hook

on:
  schedule:
    # 20:00 IST (14:30 UTC) every Wednesday and Sunday
    - cron: '30 14 * * 0,3'
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Call Cloudflare deploy hook
        run: |
          status=$(curl -X POST -s -o /dev/null -w '%{http_code}' "$DEPLOY_HOOK_URL")
          echo "Deploy hook responded with HTTP $status"
          if [ "$status" -lt 200 ] || [ "$status" -ge 300 ]; then
            exit 1
          fi
        env:
          DEPLOY_HOOK_URL: ${{ secrets.CLOUDFLARE_DEPLOY_HOOK }}
