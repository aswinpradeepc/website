<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aswin Pradeep C</title>
  <meta name="description" content="Software Engineer. I build backends, break things, and occasionally fix them." />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<nav id="nav"></nav>

<main>
  <div id="home-content"></div>
</main>

<footer id="footer"></footer>

<script src="nav.js"></script>
<script src="footer.js"></script>
<script>
(async () => {
  let data;
  try {
    const res = await fetch('./data.json');
    data = await res.json();
  } catch {
    document.getElementById('home-content').innerHTML =
      '<p style="color:var(--muted);font-size:.9rem">Failed to load content.</p>';
    return;
  }

  const { meta, now, about } = data;
  const container = document.getElementById('home-content');

  container.innerHTML = `
    <div class="fade-up">
      <h1 class="home-name">${meta.name}</h1>
      <p class="home-tagline">${meta.tagline}</p>
      <div class="home-nav-links">
        <a href="mailto:${meta.email}">${meta.email}</a>
        <a href="${meta.links.github}" target="_blank" rel="noopener">GitHub</a>
        <a href="${meta.links.linkedin}" target="_blank" rel="noopener">LinkedIn</a>
        <a href="${meta.links.devbio}" target="_blank" rel="noopener">devb.io</a>
      </div>
    </div>

    <section class="fade-up">
      <span class="section-label">Now</span>
      <div class="now-block">
        <p>${now}</p>
      </div>
    </section>

    <section class="fade-up">
      <span class="section-label">About</span>
      <div class="about-block">
        <p>${about}</p>
      </div>
    </section>
  `;
})();
</script>
</body>
</html>
