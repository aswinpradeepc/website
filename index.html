<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aswin Pradeep C</title>
  <meta name="description" content="Software Engineer. I build backends, break things, and occasionally fix them." />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink: #111111;
      --muted: #666666;
      --faint: #e8e8e8;
      --bg: #ffffff;
      --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
      --mono: 'SF Mono', 'Fira Code', 'Cascadia Code', 'Consolas', monospace;
      --max: 680px;
      --gap: 1.75rem;
    }

    html { font-size: 16px; }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--ink);
      line-height: 1.65;
      padding: 3rem 1.5rem 6rem;
      -webkit-font-smoothing: antialiased;
    }

    .container {
      max-width: var(--max);
      margin: 0 auto;
    }

    /* ── HEADER ── */
    header {
      padding-bottom: 2.5rem;
      border-bottom: 1px solid var(--faint);
      margin-bottom: 3rem;
    }

    header h1 {
      font-size: 1.5rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      margin-bottom: 0.4rem;
    }

    header .tagline {
      color: var(--muted);
      font-size: 0.975rem;
      margin-bottom: 1.25rem;
      max-width: 480px;
    }

    .links {
      display: flex;
      flex-wrap: wrap;
      gap: 0.25rem 0;
    }

    .links a {
      color: var(--ink);
      text-decoration: none;
      font-size: 0.875rem;
      border-bottom: 1px solid var(--ink);
      padding-bottom: 1px;
      margin-right: 1.25rem;
      transition: opacity 0.15s;
    }

    .links a:hover { opacity: 0.45; }

    /* ── SECTIONS ── */
    section {
      margin-bottom: 3rem;
    }

    section h2 {
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 1.25rem;
    }

    /* ── NOW ── */
    #now p {
      font-size: 0.975rem;
      color: var(--ink);
      max-width: 560px;
    }

    /* ── WORK ── */
    .work-item {
      margin-bottom: 2rem;
      padding-bottom: 2rem;
      border-bottom: 1px solid var(--faint);
    }

    .work-item:last-child {
      border-bottom: none;
      margin-bottom: 0;
      padding-bottom: 0;
    }

    .work-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      flex-wrap: wrap;
      gap: 0.25rem;
      margin-bottom: 0.2rem;
    }

    .work-header .company {
      font-weight: 600;
      font-size: 0.975rem;
    }

    .work-header .period {
      font-size: 0.8rem;
      color: var(--muted);
      font-family: var(--mono);
    }

    .work-role {
      font-size: 0.875rem;
      color: var(--muted);
      margin-bottom: 0.75rem;
    }

    .work-bullets {
      list-style: none;
      padding: 0;
    }

    .work-bullets li {
      font-size: 0.9rem;
      padding-left: 1rem;
      position: relative;
      margin-bottom: 0.3rem;
      color: #333;
    }

    .work-bullets li::before {
      content: '—';
      position: absolute;
      left: 0;
      color: var(--muted);
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      margin-top: 0.75rem;
    }

    .tag {
      font-size: 0.72rem;
      font-family: var(--mono);
      color: var(--muted);
      border: 1px solid var(--faint);
      padding: 0.1rem 0.5rem;
      border-radius: 2px;
    }

    /* ── PROJECTS ── */
    .project-item {
      margin-bottom: 1.75rem;
      padding-bottom: 1.75rem;
      border-bottom: 1px solid var(--faint);
    }

    .project-item:last-child {
      border-bottom: none;
      margin-bottom: 0;
      padding-bottom: 0;
    }

    .project-name-row {
      display: flex;
      align-items: baseline;
      gap: 0.75rem;
      margin-bottom: 0.35rem;
      flex-wrap: wrap;
    }

    .project-name-row span {
      font-weight: 600;
      font-size: 0.975rem;
    }

    .project-name-row a {
      font-size: 0.8rem;
      color: var(--muted);
      text-decoration: none;
      border-bottom: 1px solid var(--faint);
      transition: color 0.15s, border-color 0.15s;
    }

    .project-name-row a:hover {
      color: var(--ink);
      border-color: var(--ink);
    }

    .project-desc {
      font-size: 0.9rem;
      color: #333;
      max-width: 520px;
    }

    /* ── OPEN SOURCE ── */
    .oss-item {
      font-size: 0.9rem;
    }

    .oss-item strong { font-weight: 600; }

    .oss-item p { color: #333; margin-top: 0.2rem; }

    .oss-item .oss-links {
      margin-top: 0.5rem;
      display: flex;
      gap: 1rem;
    }

    .oss-item .oss-links a {
      font-size: 0.8rem;
      color: var(--muted);
      text-decoration: none;
      border-bottom: 1px solid var(--faint);
      transition: color 0.15s, border-color 0.15s;
    }

    .oss-item .oss-links a:hover {
      color: var(--ink);
      border-color: var(--ink);
    }

    /* ── WRITING / BLOGS ── */
    .blog-list {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .blog-item a {
      text-decoration: none;
      color: var(--ink);
      font-size: 0.9rem;
      border-bottom: 1px solid transparent;
      transition: border-color 0.15s;
    }

    .blog-item a:hover { border-color: var(--ink); }

    .blog-item .blog-date {
      font-size: 0.78rem;
      font-family: var(--mono);
      color: var(--muted);
      margin-top: 0.1rem;
    }

    .rick-zone {
      display: none;
      flex-direction: column;
      align-items: flex-start;
      gap: 0.75rem;
    }

    .rick-zone p {
      font-size: 0.875rem;
      color: var(--muted);
      font-style: italic;
    }

    .rick-btn {
      font-size: 0.8rem;
      font-family: var(--mono);
      background: none;
      border: 1px solid var(--ink);
      padding: 0.4rem 0.85rem;
      cursor: pointer;
      color: var(--ink);
      transition: background 0.15s, color 0.15s;
    }

    .rick-btn:hover {
      background: var(--ink);
      color: var(--bg);
    }

    .rick-embed {
      display: none;
      margin-top: 0.5rem;
    }

    .rick-embed iframe {
      width: 100%;
      max-width: 480px;
      height: 270px;
      border: 1px solid var(--faint);
    }

    /* ── SKILLS ── */
    .skills-grid {
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
    }

    .skill-row {
      display: flex;
      gap: 0.75rem;
      font-size: 0.875rem;
      align-items: baseline;
      flex-wrap: wrap;
    }

    .skill-cat {
      font-weight: 600;
      min-width: 110px;
      flex-shrink: 0;
      font-size: 0.8rem;
    }

    .skill-vals {
      color: #444;
    }

    /* ── ACHIEVEMENTS ── */
    .achievement-list {
      list-style: none;
      padding: 0;
      display: flex;
      flex-direction: column;
      gap: 0.65rem;
    }

    .achievement-list li {
      font-size: 0.9rem;
      padding-left: 1rem;
      position: relative;
      color: #333;
    }

    .achievement-list li::before {
      content: '↗';
      position: absolute;
      left: 0;
      color: var(--muted);
      font-size: 0.8rem;
    }

    /* ── ABOUT ── */
    #about p {
      font-size: 0.975rem;
      color: var(--ink);
      max-width: 540px;
    }

    /* ── CONTACT ── */
    #contact p {
      font-size: 0.9rem;
      color: var(--muted);
      margin-bottom: 0.6rem;
    }

    #contact a {
      color: var(--ink);
      font-size: 0.95rem;
      text-decoration: none;
      border-bottom: 1px solid var(--ink);
      transition: opacity 0.15s;
    }

    #contact a:hover { opacity: 0.45; }

    /* ── FOOTER ── */
    footer {
      margin-top: 4rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--faint);
      font-size: 0.78rem;
      font-family: var(--mono);
      color: var(--muted);
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    /* ── LOADING ── */
    .skeleton {
      background: linear-gradient(90deg, var(--faint) 25%, #f0f0f0 50%, var(--faint) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.2s infinite;
      border-radius: 2px;
      height: 0.9rem;
      margin-bottom: 0.4rem;
    }

    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 480px) {
      body { padding: 2rem 1.25rem 5rem; }
      .work-header { flex-direction: column; gap: 0; }
      .skill-cat { min-width: 90px; }
    }
  </style>
</head>
<body>
<div class="container" id="app">
  <!-- Rendered by JS below -->
</div>

<script>
(async () => {
  const app = document.getElementById('app');

  // ── Load data.json ──
  let data;
  try {
    const res = await fetch('./data.json');
    data = await res.json();
  } catch (e) {
    app.innerHTML = '<p style="color:#666;font-size:.9rem">Failed to load portfolio data.</p>';
    return;
  }

  const { meta, now, work, projects, opensource, achievements, skills, about } = data;

  // ── Helpers ──
  const el = (tag, cls, html) => {
    const e = document.createElement(tag);
    if (cls) e.className = cls;
    if (html !== undefined) e.innerHTML = html;
    return e;
  };

  const a = (href, text, attrs = '') =>
    `<a href="${href}" target="_blank" rel="noopener" ${attrs}>${text}</a>`;

  // ── HEADER ──
  const header = document.createElement('header');
  header.innerHTML = `
    <h1>${meta.name}</h1>
    <p class="tagline">${meta.tagline}</p>
    <div class="links">
      ${a(meta.links.github, 'GitHub')}
      ${a(meta.links.linkedin, 'LinkedIn')}
      ${a(meta.links.devbio, 'devb.io')}
      <a href="mailto:${meta.email}">${meta.email}</a>
    </div>
  `;
  app.appendChild(header);

  // ── NOW ──
  const nowSec = el('section', '', `<h2>Now</h2><p>${now}</p>`);
  nowSec.id = 'now';
  app.appendChild(nowSec);

  // ── WORK ──
  const workSec = el('section');
  workSec.id = 'work';
  workSec.appendChild(el('h2', '', 'Experience'));
  work.forEach(w => {
    const div = el('div', 'work-item');
    div.innerHTML = `
      <div class="work-header">
        <span class="company">${w.company}</span>
        <span class="period">${w.period}</span>
      </div>
      <div class="work-role">${w.role} · ${w.location}</div>
      <ul class="work-bullets">
        ${w.bullets.map(b => `<li>${b}</li>`).join('')}
      </ul>
      <div class="tags">${w.tech.map(t => `<span class="tag">${t}</span>`).join('')}</div>
    `;
    workSec.appendChild(div);
  });
  app.appendChild(workSec);

  // ── PROJECTS ──
  const projSec = el('section');
  projSec.id = 'projects';
  projSec.appendChild(el('h2', '', 'Projects'));
  projects.forEach(p => {
    const div = el('div', 'project-item');
    const links = [
      p.github ? a(p.github, 'GitHub') : '',
      p.live   ? a(p.live, 'Live ↗') : ''
    ].filter(Boolean).join('');
    div.innerHTML = `
      <div class="project-name-row">
        <span>${p.name}</span>
        ${links}
      </div>
      <p class="project-desc">${p.desc}</p>
      <div class="tags">${p.tech.map(t => `<span class="tag">${t}</span>`).join('')}</div>
    `;
    projSec.appendChild(div);
  });
  app.appendChild(projSec);

  // ── OPEN SOURCE ──
  const ossSec = el('section');
  ossSec.id = 'opensource';
  ossSec.appendChild(el('h2', '', 'Open Source'));
  opensource.forEach(o => {
    const div = el('div', 'oss-item');
    div.innerHTML = `
      <strong>${o.project}</strong>
      <p>${o.desc}</p>
      <div class="oss-links">
        ${a(o.url, 'Repository')}
        ${a(o.profile, 'My profile')}
      </div>
    `;
    ossSec.appendChild(div);
  });
  app.appendChild(ossSec);

  // ── WRITING ── (fetch Medium RSS via rss2json)
  const writingSec = el('section');
  writingSec.id = 'writing';
  writingSec.appendChild(el('h2', '', 'Writing'));

  const blogList  = el('div', 'blog-list');
  const rickZone  = el('div', 'rick-zone');
  rickZone.style.display = 'none';

  // Skeleton while loading
  for (let i = 0; i < 3; i++) {
    const sk = el('div');
    sk.innerHTML = '<div class="skeleton" style="width:70%"></div><div class="skeleton" style="width:30%"></div>';
    blogList.appendChild(sk);
  }

  writingSec.appendChild(blogList);

  rickZone.innerHTML = `
    <p>Nothing here yet. Probably thinking about it.</p>
    <button class="rick-btn" id="rick-btn">view secret drafts.exe</button>
    <div class="rick-embed" id="rick-embed">
      <iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ?autoplay=1"
        title="definitely my blog" frameborder="0" allow="autoplay" allowfullscreen></iframe>
    </div>
  `;
  writingSec.appendChild(rickZone);
  app.appendChild(writingSec);

  // Async fetch blogs
  (async () => {
    try {
      const feedUrl = encodeURIComponent(`https://medium.com/feed/@${meta.medium_username}`);
      const rssRes  = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${feedUrl}`);
      const rssData = await rssRes.json();

      blogList.innerHTML = '';

      if (rssData.status === 'ok' && rssData.items && rssData.items.length > 0) {
        rssData.items.slice(0, 5).forEach(post => {
          const date = new Date(post.pubDate).toLocaleDateString('en-GB', {
            year: 'numeric', month: 'short', day: 'numeric'
          });
          const item = el('div', 'blog-item');
          item.innerHTML = `
            <a href="${post.link}" target="_blank" rel="noopener">${post.title}</a>
            <div class="blog-date">${date}</div>
          `;
          blogList.appendChild(item);
        });
      } else {
        rickZone.style.display = 'flex';
      }
    } catch {
      blogList.innerHTML = '';
      rickZone.style.display = 'flex';
    }

    // Rick roll button
    document.getElementById('rick-btn')?.addEventListener('click', () => {
      const embed = document.getElementById('rick-embed');
      embed.style.display = embed.style.display === 'none' ? 'block' : 'none';
    });
  })();

  // ── SKILLS ──
  const skillSec = el('section');
  skillSec.id = 'skills';
  skillSec.appendChild(el('h2', '', 'Skills'));
  const grid = el('div', 'skills-grid');
  Object.entries(skills).forEach(([cat, vals]) => {
    const row = el('div', 'skill-row');
    row.innerHTML = `<span class="skill-cat">${cat}</span><span class="skill-vals">${vals.join(', ')}</span>`;
    grid.appendChild(row);
  });
  skillSec.appendChild(grid);
  app.appendChild(skillSec);

  // ── ACHIEVEMENTS ──
  const achSec = el('section');
  achSec.id = 'achievements';
  achSec.appendChild(el('h2', '', 'A Few Things'));
  const achList = el('ul', 'achievement-list');
  achievements.forEach(ach => {
    achList.appendChild(el('li', '', ach));
  });
  achSec.appendChild(achList);
  app.appendChild(achSec);

  // ── ABOUT ──
  const aboutSec = el('section', '', `<h2>About</h2><p>${about}</p>`);
  aboutSec.id = 'about';
  app.appendChild(aboutSec);

  // ── CONTACT ──
  const contactSec = el('section');
  contactSec.id = 'contact';
  contactSec.innerHTML = `
    <h2>Contact</h2>
    <p>Questions, opportunities, or just want to say hi.</p>
    <a href="mailto:${meta.email}">${meta.email}</a>
  `;
  app.appendChild(contactSec);

  // ── FOOTER ──
  const footer = el('footer', '', `
    <span>aswinpradeepc.com</span>
    <span>Updated ${new Date().getFullYear()}</span>
  `);
  app.appendChild(footer);
})();
</script>
</body>
</html>
