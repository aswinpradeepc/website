<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Projects — Aswin Pradeep C</title>
  <meta name="description" content="Projects and open source contributions by Aswin Pradeep C." />
  <meta name="author" content="Aswin Pradeep C" />
  <meta name="robots" content="index, follow" />
  <link rel="canonical" href="https://aswinpradeepc.com/projects" />
  
  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://aswinpradeepc.com/projects.html" />
  <meta property="og:title" content="Projects — Aswin Pradeep C" />
  <meta property="og:description" content="Projects and open source contributions by Aswin Pradeep C." />
  <meta property="og:site_name" content="Aswin Pradeep C" />
  <meta property="og:image" content="https://aswinpradeepc.com/images/profile.jpg" />
  <meta property="og:image:alt" content="Aswin Pradeep C" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="1200" />
  <meta property="og:image:type" content="image/jpeg" />
  
  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:site" content="@aswinpradeepc" />
  <meta name="twitter:title" content="Projects — Aswin Pradeep C" />
  <meta name="twitter:description" content="Projects and open source contributions by Aswin Pradeep C." />
  <meta name="twitter:image" content="https://aswinpradeepc.com/images/profile.jpg" />
  
  <meta name="theme-color" content="#000000" />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="stylesheet" href="style.css" />
  
  <!-- JSON-LD Structured Data -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Person",
    "name": "Aswin Pradeep C",
    "jobTitle": "Backend Developer",
    "url": "https://aswinpradeepc.com",
    "sameAs": [
      "https://github.com/aswinpradeepc",
      "https://linkedin.com/in/aswinpradeepc"
    ]
  }
  </script>
</head>
<body>

<nav id="nav"></nav>

<main>
  <div id="projects-content"></div>
</main>

<footer id="footer"></footer>

<script src="nav.js"></script>
<script src="footer.js"></script>
<script>
(async () => {
  let data;
  try {
    const res = await fetch('./data.json');
    data = await res.json();
  } catch {
    document.getElementById('projects-content').innerHTML =
      '<p style="color:var(--muted);font-size:.9rem">Failed to load content.</p>';
    return;
  }

  const { projects, opensource, meta } = data;
  const container = document.getElementById('projects-content');

  const projectItems = projects.map(p => {
    const links = [
      p.github ? `<a class="subtle" href="${p.github}" target="_blank" rel="noopener">GitHub ↗</a>` : '',
      p.live   ? `<a class="subtle" href="${p.live}"   target="_blank" rel="noopener">Live ↗</a>`   : '',
    ].filter(Boolean).join('');
    const tags = p.tech.map(t => `<span class="tag">${t}</span>`).join('');
    return `
      <div class="project-item fade-up">
        <div class="project-name-row">
          <span class="project-name">${p.name}</span>
          ${links}
        </div>
        <p class="project-desc">${p.desc}</p>
        <div class="tags">${tags}</div>
      </div>
    `;
  }).join('');

  const ossItems = opensource.map(o => {
    let imageHtml = '';
    if (o.image) {
      imageHtml = `
        <div class="event-image">
          <img src="${o.image}" alt="${o.project}" loading="lazy" />
        </div>
      `;
    }

    return `
      <div class="oss-item fade-up">
        <div class="oss-name">${o.project}</div>
        <p class="oss-desc">${o.desc}</p>
        <div class="oss-links">
          <a class="subtle" href="${o.url}"     target="_blank" rel="noopener">Repository ↗</a>
          <a class="subtle" href="${o.profile}" target="_blank" rel="noopener">My profile ↗</a>
        </div>
        ${imageHtml}
      </div>
    `;
  }).join('');

  container.innerHTML = `
    <div class="fade-up">
      <span class="page-label">Aswin Pradeep C</span>
      <h1 class="page-title">Projects</h1>
    </div>

    <section>
      <span class="section-label">Selected work</span>
      ${projectItems}
      <p style="margin-top:1.5rem;font-size:.8rem;color:var(--muted);">
        More on <a class="subtle" href="${meta.links.github}" target="_blank" rel="noopener">GitHub ↗</a>
      </p>
    </section>

    <hr class="divider">

    <section>
      <span class="section-label">Open Source</span>
      ${ossItems}
    </section>
  `;
})();
</script>
</body>
</html>
