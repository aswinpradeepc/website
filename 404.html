<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - Page Not Found</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<nav id="nav"></nav>

<main style="min-height: 70vh; display: flex; align-items: center; justify-content: center;">
  <div style="text-align: center; max-width: 500px;">
    <h1 style="font-size: 6rem; font-weight: 600; margin: 0; color: var(--ink);">404</h1>
    <p style="font-size: 1.1rem; color: var(--ink-2); margin: 1.5rem 0;">
      Congrats! You found a page that doesn't exist. Not even sure how you got here, but impressive nonetheless.
    </p>
    <p style="font-size: 0.9rem; color: var(--muted); margin-bottom: 2rem;">
      Maybe try going somewhere that actually exists?
    </p>
    <a href="https://www.youtube.com/watch?v=dQw4w9WgXcQ" target="_blank" rel="noopener" style="display: inline-block; padding: 0.75rem 1.5rem; background: var(--ink); color: var(--bg); text-decoration: none; border-radius: 4px; font-size: 0.9rem; transition: opacity 0.2s;">
      Back to Home
    </a>
  </div>
</main>

<footer id="footer"></footer>

<script src="nav.js"></script>
<script src="footer.js"></script>
</body>
</html>
