<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Activities — Aswin Pradeep C</title>
  <meta name="description" content="Community involvement, leadership roles, and achievements by Aswin Pradeep C." />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<nav id="nav"></nav>

<main>
  <div id="activities-content"></div>
</main>

<footer id="footer"></footer>

<script src="nav.js"></script>
<script src="footer.js"></script>
<script>
(async () => {
  let data;
  try {
    const res = await fetch('./data.json');
    data = await res.json();
  } catch {
    document.getElementById('activities-content').innerHTML =
      '<p style="color:var(--muted);font-size:.9rem">Failed to load content.</p>';
    return;
  }

  const { activities } = data;
  const container = document.getElementById('activities-content');

  // Helper function to render activity items
  const renderItems = (items) => {
    return items.map(e => {
      const tags = e.tags.map(t => `<span class="tag">${t}</span>`).join('');

      let imageHtml = '';
      if (e.image) {
        imageHtml = `
          <div class="event-image">
            <img src="${e.image}" alt="${e.title}" loading="lazy" />
          </div>
        `;
      }

      let linkHtml = '';
      if (e.link) {
        linkHtml = `
          <div style="margin-top: 0.5rem;">
            <a class="subtle" href="${e.link}" target="_blank" rel="noopener">View details ↗</a>
          </div>
        `;
      }

      return `
        <div class="event-item fade-up">
          <div class="event-header">
            <span class="event-title">${e.title}</span>
            <span class="event-date">${e.date}</span>
          </div>
          <div class="event-subtitle">${e.subtitle}</div>
          <p class="event-desc">${e.description}</p>
          <div class="tags">${tags}</div>
          ${imageHtml}
          ${linkHtml}
        </div>
      `;
    }).join('');
  };

  const communityItems = renderItems(activities.community);
  const achievementItems = renderItems(activities.achievements);

  container.innerHTML = `
    <div class="fade-up">
      <span class="page-label">Aswin Pradeep C</span>
      <h1 class="page-title">Activities</h1>
    </div>

    <section>
      <span class="section-label">Community</span>
      ${communityItems}
    </section>

    <hr class="divider">

    <section>
      <span class="section-label">Achievements</span>
      ${achievementItems}
    </section>
  `;
})();
</script>
</body>
</html>
